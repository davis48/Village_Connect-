services:
  db:
    image: mysql:8.0
    container_name: village-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: village_connecte
      MYSQL_USER: village_user
      MYSQL_PASSWORD: village_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_complete.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - village-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: village-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - village-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: village-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: dev_secret_for_docker
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: village_connecte
      FRONTEND_PATH: /frontend
    volumes:
      - ./backend:/app
      - ./frontend:/frontend:ro
      - /app/node_modules
    networks:
      - village-internal
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.village-connect.rule=Host(`village.voisilab.online`)"
      - "traefik.http.routers.village-connect.entrypoints=websecure"
      - "traefik.http.routers.village-connect.tls.certresolver=letsencrypt"
      - "traefik.http.services.village-connect.loadbalancer.server.port=3000"
      - "traefik.http.routers.village-connect.middlewares=village-connect-headers"
      - "traefik.http.middlewares.village-connect-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.village-connect-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.village-connect-headers.headers.forceSTSHeader=true"

volumes:
  mysql_data:

networks:
  village-internal:
    driver: bridge
  traefik-network:
    external: true
